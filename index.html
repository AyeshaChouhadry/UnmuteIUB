<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unmute IUB – Student Platform</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome icons (optional, for professional look) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Custom IUB colours override -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== SPLASH SCREEN ========== -->
  <div id="splash" class="splash-screen">
    <div class="splash-content">
      <div class="shield-logo">IUB</div>
      <h1 class="unmute-text">Unmute <span>IUB</span></h1>
    </div>
  </div>

  <!-- ========== MAIN APP (hidden until splash fades) ========== -->
  <div id="app" style="display: none;">
    <div class="container-fluid">
      <div class="row">

        <!-- ===== LEFT SIDEBAR ===== -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar">
          <div class="position-sticky pt-3">
            <h4 class="text-warning fw-bold mb-4">Unmute IUB</h4>
            <ul class="nav flex-column">
              <li class="nav-item">
                <a class="nav-link text-white" href="#" id="homeLink">
                  <i class="fas fa-home me-2"></i> Home
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white" href="admin.html">
                  <i class="fas fa-cogs me-2"></i> Admin Panel
                </a>
              </li>
            </ul>
            <hr class="text-white-50">
            <button class="btn btn-warning w-100 mt-2" id="scrollToForm">
              <i class="fas fa-plus me-1"></i> Create Post
            </button>
          </div>
        </nav>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

          <!-- Filter & Stats Row -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 mb-0">📰 Latest Posts</h2>
            <div class="d-flex gap-2">
              <label for="filterCategory" class="form-label align-self-center mb-0">Filter:</label>
              <select id="filterCategory" class="form-select w-auto">
                <option value="">All Categories</option>
                <option value="Scholarships">Scholarships</option>
                <option value="Teachers">Teachers</option>
                <option value="Assignments">Assignments</option>
                <option value="Events">Events</option>
                <option value="Notes">Notes</option>
              </select>
            </div>
          </div>

          <!-- Loading / Error -->
          <div id="loading" class="text-center d-none">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading posts...</p>
          </div>
          <div id="error" class="alert alert-danger d-none"></div>

          <!-- Post List -->
          <section id="postList" class="row row-cols-1 g-3 mb-5"></section>

          <!-- Create Post Form (now below the feed) -->
          <section id="createSection" class="card p-4 shadow-sm" style="border-top: 4px solid #E5AE32;">
            <h3 class="mb-3">Share Something Useful</h3>
            <form id="createPostForm" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="author" class="form-label">Your Name *</label>
                  <input type="text" class="form-control" id="author" required>
                  <div class="invalid-feedback">Name is required.</div>
                </div>
                <div class="col-md-6">
                  <label for="category" class="form-label">Category *</label>
                  <select class="form-select" id="category" required>
                    <option value="">Choose...</option>
                    <option>Scholarships</option>
                    <option>Teachers</option>
                    <option>Assignments</option>
                    <option>Events</option>
                    <option>Notes</option>
                  </select>
                  <div class="invalid-feedback">Select a category.</div>
                </div>
                <div class="col-12">
                  <label for="title" class="form-label">Title</label>
                  <input type="text" class="form-control" id="title" required minlength="5">
                  <div class="invalid-feedback">Title must be at least 5 characters.</div>
                </div>
                <div class="col-12">
                  <label for="body" class="form-label">Post Content *</label>
                  <textarea class="form-control" id="body" rows="3" required minlength="10"></textarea>
                  <div class="invalid-feedback">Please write at least 10 characters.</div>
                </div>
                <div class="col-md-6">
                  <label for="date" class="form-label">Date *</label>
                  <input type="date" class="form-control" id="date" required>
                  <div class="invalid-feedback">Choose a date.</div>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-warning fw-bold">Post</button>
                </div>
              </div>
            </form>
          </section>
        </main>

      </div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
