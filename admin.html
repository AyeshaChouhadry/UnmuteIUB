<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unmute IUB – Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">
  <!-- Admin Navbar (different colour) -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1 text-warning">🔧 Admin Panel – Unmute IUB</span>
    </div>
  </nav>

  <main class="container py-4">
    <!-- Statistics Row -->
    <div class="row g-3 mb-4" id="statsRow"></div>

    <!-- All Posts Table -->
    <h2>All Posts</h2>
    <div id="adminLoading" class="text-center d-none">
      <div class="spinner-border text-primary"></div>
    </div>
    <div id="adminError" class="alert alert-danger d-none"></div>
    <div class="table-responsive">
      <table class="table table-striped table-hover" id="adminTable">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Author</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminTbody"></tbody>
      </table>
    </div>

    <!-- Edit Form (hidden by default) -->
    <section id="editSection" class="card p-4 mt-4 d-none" style="border-left: 5px solid #E5AE32;">
      <h3>Edit Post</h3>
      <form id="editForm" novalidate>
        <input type="hidden" id="editId" />
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Author *</label>
            <input type="text" class="form-control" id="editAuthor" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Category *</label>
            <select class="form-select" id="editCategory" required>
              <option>Scholarships</option><option>Teachers</option>
              <option>Assignments</option><option>Events</option><option>Notes</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Title *</label>
            <input type="text" class="form-control" id="editTitle" required />
          </div>
          <div class="col-12">
            <label class="form-label">Body *</label>
            <textarea class="form-control" id="editBody" rows="3" required></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">Date *</label>
            <input type="date" class="form-control" id="editDate" required />
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-warning">Update Post</button>
            <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
